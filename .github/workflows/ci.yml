name: build-test

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore HanEngIndicator.sln

      - name: Build (Release)
        run: dotnet build HanEngIndicator.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/HanEngIndicator.Tests/HanEngIndicator.Tests.csproj -c Release --no-build
